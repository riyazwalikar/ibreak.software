{{ partial "head.html" . }}
  <body>
    <div id="blog">
      {{ partial "header.html" . }}
      {{ partial "post/header-cover.html" . }}
      <div id="main" data-behavior="{{ .Scratch.Get "sidebarBehavior" }}" class="page-full-width">
        <article class="post page-about" id="top">
          {{ if or (not .Params.coverimage) (eq .Params.covermeta "out") }}
            {{ partial "post/header.html" . }}
          {{ end }}

          <div class="post-content markdown">
            <div class="main-content-wrap">
              <div class="page-back-nav">
                <a href="/" class="page-back-link">← Back to blog</a>
              </div>
              {{ .Content }}
            </div>
          </div>
          <div id="post-footer" class="post-footer main-content-wrap">
          </div>
        </article>
        {{ partial "footer.html" . }}
      </div>
      <div id="bottom-bar" class="post-bottom-bar" data-behavior="{{ .Scratch.Get "sidebarBehavior" }}">
      </div>
    </div>
{{ partial "foot.html" . }}
